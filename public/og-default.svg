<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#accent)" opacity="0.08"/>
  <!-- Logo -->
  <rect x="60" y="60" width="80" height="80" rx="16" fill="#2563EB"/>
  <text x="100" y="118" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">A</text>
  <text x="160" y="115" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="-0.02em">AppLabx</text>
  <!-- Divider -->
  <rect x="60" y="170" width="1080" height="1" fill="url(#accent)" opacity="0.3"/>
  <!-- Headline -->
  <text x="60" y="280" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">AI-Powered B2B</text>
  <text x="60" y="350" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">Lead Generation</text>
  <!-- Sub -->
  <text x="60" y="420" font-family="Arial, sans-serif" font-size="24" fill="#94A3B8">Generate qualified leads. Book more calls. Scale your pipeline.</text>
  <!-- Bottom URL -->
  <rect x="60" y="560" width="400" height="40" rx="8" fill="url(#accent)" opacity="0.15"/>
  <text x="80" y="586" font-family="Arial, sans-serif" font-size="18" fill="#64748B">lead-gen-agency.applabx.com</text>
  <!-- Bottom-right logo repeat for balance -->
  <rect x="1040" y="540" width="100" height="50" rx="10" fill="#2563EB" opacity="0.3"/>
  <text x="1090" y="575" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle" opacity="0.6">A</text>
</svg>
